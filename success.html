<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Payment · Heavenxent Keepsakes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Outfit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    /* ============================================
       HEAVENXENT — SITE STYLES (aligned)
       ============================================ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --cream: #faf7f2;
      --warm-white: #fffef9;
      --parchment: #f2ede4;
      --soft: #e8ddd4;
      --gold: #c9a96e;
      --gold-light: #e8d5b0;
      --gold-dark: #9a7a45;
      --ink: #1a1714;
      --ink-soft: #3d3830;
      --ink-muted: #7a7268;
      --border: rgba(201, 169, 110, 0.25);
    }

    body {
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      background: var(--cream);
      color: var(--ink);
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* subtle grain overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
    }

    .success-container {
      max-width: 560px;
      margin: 2rem auto;
      padding: 0 1.5rem 2rem;
      width: 100%;
      flex: 1;
      display: flex;
      align-items: center;
    }

    .success-card {
      background: var(--warm-white);
      border-radius: 1.75rem;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.05), 0 2px 4px rgba(0, 0, 0, 0.02);
      padding: 2rem 2rem 2.2rem;
      width: 100%;
      border: 1px solid var(--border);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      font-weight: 400;
      letter-spacing: -0.2px;
      color: var(--ink);
      margin-bottom: 0.4rem;
      line-height: 1.2;
    }

    .subhead {
      font-size: 0.85rem;
      color: var(--ink-muted);
      margin-bottom: 1.6rem;
      border-bottom: 1px solid var(--border);
      display: inline-block;
      padding-bottom: 5px;
    }

    .order-details-panel {
      background: var(--cream);
      border-radius: 1.2rem;
      padding: 1.2rem 1.2rem;
      margin: 1rem 0 1.2rem;
      border: 1px solid var(--border);
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      font-weight: 400;
      color: var(--ink-muted);
      font-size: 0.7rem;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .detail-value {
      font-weight: 400;
      color: var(--ink-soft);
      font-size: 0.9rem;
      word-break: break-word;
      text-align: right;
      max-width: 60%;
    }

    .payment-status {
      border-radius: 40px;
      padding: 4px 12px;
      font-size: 0.7rem;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .payment-status.paid {
      background: #eaf6e6;
      color: #1b5e2a;
    }

    .payment-status.pending {
      background: #fff0db;
      color: #b45f1b;
    }

    .info-note {
      background: var(--parchment);
      border-radius: 1rem;
      padding: 0.7rem 1rem;
      margin: 0.8rem 0;
      font-size: 0.75rem;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      border-left: 3px solid var(--gold);
      color: var(--ink-soft);
    }

    /* BUTTONS — exact match to site */
    .btn-group {
      display: flex;
      gap: 1.2rem;
      justify-content: center;
      flex-wrap: wrap;
      margin: 1.4rem 0 0.5rem;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 11px 26px;
      background: var(--ink);
      color: var(--cream);
      text-decoration: none;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      transition: background 0.3s, gap 0.3s;
      border-radius: 0;
    }

    .btn-primary:hover {
      background: var(--gold-dark);
      gap: 16px;
    }

    .btn-outline {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 11px 26px;
      background: transparent;
      color: var(--ink-muted);
      text-decoration: none;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      transition: color 0.25s, border-color 0.25s;
      border-radius: 0;
    }

    .btn-outline:hover {
      color: var(--gold-dark);
      border-color: var(--gold);
    }

    .download-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 11px 26px;
      background: var(--gold);
      color: var(--ink);
      text-decoration: none;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      transition: background 0.3s, gap 0.3s;
      border-radius: 0;
    }

    .download-link:hover {
      background: var(--gold-light);
      gap: 14px;
    }

    .refresh-btn {
      background: none;
      border: none;
      font-size: 0.7rem;
      color: var(--gold-dark);
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      text-decoration: underline;
      letter-spacing: 0.06em;
      margin-top: 8px;
      transition: opacity 0.2s;
    }

    .refresh-btn:hover {
      opacity: 0.7;
    }

    .footnote {
      margin-top: 1.4rem;
      font-size: 0.68rem;
      color: var(--ink-muted);
      text-align: center;
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }

    .loader {
      display: inline-block;
      width: 22px;
      height: 22px;
      border: 2px solid var(--soft);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-state {
      text-align: center;
      padding: 2rem 1rem;
    }

    .loading-state span {
      color: var(--ink-muted);
      font-size: 0.85rem;
    }

    footer {
      margin-top: auto;
      text-align: center;
      padding: 1.2rem 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.7rem;
      color: var(--ink-muted);
    }

    footer a {
      color: var(--gold-dark);
      text-decoration: none;
    }

    @media (max-width: 500px) {
      .success-card { padding: 1.5rem; }
      h1 { font-size: 1.6rem; }
      .detail-row { flex-direction: column; gap: 4px; }
      .detail-value { text-align: left; max-width: 100%; }
      .btn-primary, .btn-outline, .download-link { padding: 9px 20px; font-size: 9px; }
    }
  </style>
</head>
<body>

<div class="success-container">
  <div class="success-card" id="successCard">
    <div id="dynamicContent">
      <!-- loading state -->
      <div class="loading-state">
        <div class="loader" style="margin-bottom: 12px;"></div>
        <span>Verifying payment status...</span>
      </div>
    </div>
  </div>
</div>

<footer>
  <p>✨ Heavenxent Keepsakes — where your love becomes art ✨</p>
  <p style="margin-top: 0.3rem;">Need help? <a href="/cdn-cgi/l/email-protection#6d0c1f081e1f2d0a0303190c03190c190e08430e0200">hello@heavenxentph.com</a></p>
</footer>

<script>
  (function() {
    // ---- get URL parameters ----
    const urlParams = new URLSearchParams(window.location.search);
    let orderRef = urlParams.get('ref');
    const orderEmail = urlParams.get('email');
    let orderName = urlParams.get('name');
    let orderType = urlParams.get('type');
    const sessionId = urlParams.get('session_id');
    
    // localStorage fallback (minimal)
    try {
      const lastOrder = localStorage.getItem('heavenxent_last_order');
      if (lastOrder && !orderRef) {
        const parsed = JSON.parse(lastOrder);
        if (!orderRef) orderRef = parsed.ref;
        if (!orderName) orderName = parsed.name;
        if (!orderType) orderType = parsed.type;
      }
    } catch(e) {}
    
    // defaults
    if (!orderType) orderType = 'PDF';
    if (!orderName) orderName = orderEmail ? orderEmail.split('@')[0] : 'Customer';
    if (!orderRef) orderRef = 'HK-' + Math.floor(Math.random() * 10000);
    
    const isPrintOrder = (orderType !== 'PDF');
    const amountCents = isPrintOrder ? 19900 : 14900;
    const amountDisplay = `₱${(amountCents / 100).toFixed(2)}`;
    const orderTypeLabel = isPrintOrder ? "🖨️ Premium Print" : "📄 Digital PDF";
    
    let pollInterval = null;
    let pollAttempts = 0;
    const MAX_POLL = 25; // 75 seconds
    
    // ---- API fetch ----
    async function fetchOrderStatus() {
      try {
        let apiUrl = 'https://api.heavenxentph.com/api/check-order-status?';
        if (orderRef) {
          apiUrl += `ref=${encodeURIComponent(orderRef)}`;
        } else if (orderEmail) {
          apiUrl += `email=${encodeURIComponent(orderEmail)}`;
        } else if (sessionId) {
          apiUrl += `session_id=${encodeURIComponent(sessionId)}`;
        } else {
          return null;
        }
        const resp = await fetch(apiUrl, {
          method: 'GET',
          headers: { 'Accept': 'application/json' }
        });
        if (resp.ok) {
          const data = await resp.json();
          return data;
        }
        return null;
      } catch (err) {
        return null;
      }
    }
    
    function getOrderDate() {
      return new Date().toLocaleDateString('en-PH', { 
        year: 'numeric', 
        month: 'short', 
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }
    
    function esc(str) {
      if (!str) return '';
      return String(str).replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }
    
    // ---- RENDER UI (no icon, no top badge) ----
    function renderUI(orderData) {
      const isPaid = orderData && (orderData.status === 'paid' || orderData.payment_status === 'paid');
      const driveUrl = (isPaid && orderData?.driveFileUrl) ? orderData.driveFileUrl : null;
      
      const finalName = orderData?.name || orderName;
      const finalEmail = orderData?.email || orderEmail;
      const finalRef = orderData?.ref || orderRef;
      const finalDate = orderData?.date || getOrderDate();
      
      // title & subtitle
      let titleText = isPaid ? "Thank you for your purchase" : "Payment received";
      let subText = isPaid ? "Your order is complete." : "Finalizing your order — almost ready.";
      
      if (!isPaid) {
        subText = "We're confirming your payment. This takes just a few seconds.";
      }
      
      // order rows
      let orderRows = `
        <div class="detail-row">
          <span class="detail-label">Order ref</span>
          <span class="detail-value">${esc(finalRef)}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Type</span>
          <span class="detail-value">${orderTypeLabel}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Amount</span>
          <span class="detail-value">${amountDisplay}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Customer</span>
          <span class="detail-value">${esc(finalName)}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Status</span>
          <span class="detail-value"><span class="payment-status ${isPaid ? 'paid' : 'pending'}">${isPaid ? '✓ Paid' : '⏳ Pending'}</span></span>
        </div>
      `;
      
      // download section (only for paid PDF)
      let downloadHtml = '';
      if (isPaid && !isPrintOrder) {
        if (driveUrl) {
          downloadHtml = `
            <div style="text-align: center; margin: 0.8rem 0 0.5rem;">
              <a href="${driveUrl}" target="_blank" class="download-link">
                ⬇️ Download PDF
              </a>
            </div>
          `;
        } else {
          downloadHtml = `
            <div class="info-note">
              <span>✨</span> PDF will be emailed within 1-2 minutes
            </div>
          `;
        }
      } else if (isPaid && isPrintOrder) {
        downloadHtml = `
          <div class="info-note">
            <span>📦</span> Print order • shipping confirmation via email
          </div>
        `;
      }
      
      // email note
      let emailNote = '';
      if (finalEmail) {
        emailNote = `
          <div class="info-note">
            <span>📧</span> Confirmation sent to ${esc(finalEmail)}
          </div>
        `;
      }
      
      // manual refresh for pending
      let manualRefresh = '';
      if (!isPaid) {
        manualRefresh = `
          <div style="text-align: center; margin-top: 0.5rem;">
            <button class="refresh-btn" id="manualRefreshBtn">↻ Refresh status</button>
          </div>
        `;
      }
      
      // action buttons
      const actionButtons = `
        <div class="btn-group">
          <a href="/tag-editor/index.html" class="btn-primary">✨ New design</a>
          <a href="/" class="btn-outline">← Home</a>
        </div>
      `;
      
      // footnote
      let footnote = '';
      if (isPaid && !isPrintOrder && !driveUrl) {
        footnote = `<div class="footnote">💡 Check spam folder. <a href="/cdn-cgi/l/email-protection" style="color: var(--gold-dark);">Contact us</a> if needed.</div>`;
      } else if (isPaid && isPrintOrder) {
        footnote = `<div class="footnote">🖨️ Print orders ship within 5–7 business days.</div>`;
      } else {
        footnote = `<div class="footnote">⏳ Auto-refreshes once payment is verified.</div>`;
      }
      
      const fullHtml = `
        <h1>${titleText}</h1>
        <div class="subhead">${subText}</div>
        
        <div class="order-details-panel">
          ${orderRows}
        </div>
        
        ${downloadHtml}
        ${emailNote}
        ${manualRefresh}
        ${actionButtons}
        ${footnote}
      `;
      
      document.getElementById('dynamicContent').innerHTML = fullHtml;
      
      const refreshBtn = document.getElementById('manualRefreshBtn');
      if (refreshBtn) {
        refreshBtn.addEventListener('click', () => {
          window.location.reload();
        });
      }
      
      if (isPaid && pollInterval) {
        clearInterval(pollInterval);
        pollInterval = null;
      }
    }
    
    // ---- Pending minimal UI (no icon/badge) ----
    function showPendingUI() {
      const pendingHtml = `
        <h1>Payment received</h1>
        <div class="subhead">Verifying transaction details...</div>
        
        <div class="order-details-panel">
          <div class="detail-row">
            <span class="detail-label">Order ref</span>
            <span class="detail-value">${esc(orderRef)}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Type</span>
            <span class="detail-value">${orderTypeLabel}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Amount</span>
            <span class="detail-value">${amountDisplay}</span>
          </div>
        </div>
        
        <div class="info-note">
          <span>🔄</span> This page updates automatically
        </div>
        
        <div class="btn-group">
          <a href="/tag-editor/index.html" class="btn-primary">✨ New design</a>
          <a href="/" class="btn-outline">← Home</a>
        </div>
        
        <div style="text-align: center; margin-top: 0.8rem;">
          <button class="refresh-btn" id="pendingRefreshBtn">↻ Refresh status</button>
        </div>
        
        <div class="footnote">⏳ Usually takes less than 30 seconds.</div>
      `;
      document.getElementById('dynamicContent').innerHTML = pendingHtml;
      
      const refreshPending = document.getElementById('pendingRefreshBtn');
      if (refreshPending) {
        refreshPending.addEventListener('click', () => {
          window.location.reload();
        });
      }
    }
    
    // ---- Polling ----
    async function startPolling() {
      if (pollInterval) return;
      
      pollInterval = setInterval(async () => {
        pollAttempts++;
        const statusData = await fetchOrderStatus();
        if (statusData && (statusData.status === 'paid' || statusData.payment_status === 'paid')) {
          clearInterval(pollInterval);
          pollInterval = null;
          renderUI(statusData);
        } else if (pollAttempts >= MAX_POLL) {
          clearInterval(pollInterval);
          pollInterval = null;
          // final fallback: still pending
          renderUI({ status: 'pending', ref: orderRef, name: orderName, email: orderEmail });
        }
      }, 3000);
    }
    
    // ---- Init ----
    async function init() {
      const initialData = await fetchOrderStatus();
      if (initialData && (initialData.status === 'paid' || initialData.payment_status === 'paid')) {
        renderUI(initialData);
        return;
      }
      showPendingUI();
      startPolling();
      
      // extra fast re-check after 1s
      setTimeout(async () => {
        const recheck = await fetchOrderStatus();
        if (recheck && (recheck.status === 'paid' || recheck.payment_status === 'paid')) {
          if (pollInterval) clearInterval(pollInterval);
          pollInterval = null;
          renderUI(recheck);
        }
      }, 1200);
    }
    
    init();
  })();
</script>
</body>
</html>
