<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Payment Status · Heavenxent Keepsakes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Outfit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #fbf9f5;
      font-family: 'Outfit', sans-serif;
      color: #1e1b1a;
      line-height: 1.4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .success-container {
      max-width: 680px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      width: 100%;
    }

    .success-card {
      background: #ffffff;
      border-radius: 2rem;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08), 0 2px 6px rgba(0, 0, 0, 0.02);
      padding: 2.5rem 2rem;
      text-align: center;
      transition: all 0.2s ease;
      border: 1px solid rgba(226, 210, 190, 0.4);
    }

    .icon-illustration {
      width: 88px;
      height: 88px;
      background: #eef6e8;
      border-radius: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      box-shadow: 0 6px 12px -8px rgba(0,0,0,0.05);
    }

    .checkmark-svg {
      width: 48px;
      height: 48px;
      color: #2c6e2f;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #f0f3ea;
      padding: 6px 16px;
      border-radius: 60px;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.3px;
      color: #2a5c2e;
      margin-bottom: 1.25rem;
      font-family: 'Outfit', monospace;
    }

    .status-badge.pending {
      background: #fff0db;
      color: #b45f1b;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: #1e2a1c;
      margin-bottom: 0.75rem;
    }

    .subhead {
      font-size: 1.05rem;
      color: #4b4b44;
      margin-bottom: 2rem;
      border-bottom: 1px solid #f0e7db;
      display: inline-block;
      padding-bottom: 6px;
    }

    .order-details-panel {
      background: #fefaf5;
      border-radius: 1.5rem;
      padding: 1.5rem;
      margin: 1.8rem 0 2rem;
      text-align: left;
      border: 1px solid #f3e9df;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      padding: 12px 0;
      border-bottom: 1px dashed #ede3d7;
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      font-weight: 500;
      color: #7f6e5c;
      font-size: 0.85rem;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .detail-value {
      font-weight: 500;
      color: #2b2a27;
      font-family: 'Outfit', monospace;
      font-size: 1rem;
      word-break: break-all;
      text-align: right;
      max-width: 60%;
    }

    .payment-status {
      background: #eaf6e6;
      border-radius: 40px;
      padding: 6px 14px;
      font-size: 0.8rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #1b5e2a;
    }

    .payment-status.pending-status {
      background: #fff0db;
      color: #b45f1b;
    }

    .email-notice {
      background: #faf7f2;
      border-radius: 1rem;
      padding: 1rem 1.2rem;
      margin: 1.5rem 0;
      font-size: 0.9rem;
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      border-left: 4px solid #c7aa7a;
    }

    .btn-group {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 1.8rem;
    }

    .btn-primary {
      background: #1e1b1a;
      color: white;
      padding: 0.85rem 1.8rem;
      border-radius: 2rem;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.9rem;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #1e1b1a;
    }

    .btn-primary:hover {
      background: #3b2e28;
      transform: translateY(-2px);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid #dacdbd;
      padding: 0.85rem 1.6rem;
      border-radius: 2rem;
      text-decoration: none;
      font-weight: 500;
      color: #3e3a36;
      transition: 0.2s;
    }

    .btn-outline:hover {
      background: #f5efe8;
      border-color: #bba88c;
    }

    .download-link {
      display: inline-block;
      background: #c4956a;
      color: white;
      padding: 12px 24px;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.9rem;
      margin: 8px 0;
      transition: 0.2s;
    }

    .download-link:hover {
      background: #a87b52;
      transform: translateY(-2px);
    }

    .footnote {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #aa9e8e;
      text-align: center;
    }

    .loader {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #e0d5c8;
      border-top-color: #c4956a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 2rem;
    }

    .error-message {
      background: #fff0f0;
      border-left: 4px solid #d9534f;
      padding: 1rem;
      border-radius: 12px;
      margin: 1rem 0;
      text-align: left;
    }

    .refresh-btn {
      background: none;
      border: 1px solid #dacdbd;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-size: 0.75rem;
      margin-top: 10px;
      transition: 0.2s;
    }

    .refresh-btn:hover {
      background: #f5efe8;
    }

    @media (max-width: 500px) {
      .success-card { padding: 1.8rem; }
      h1 { font-size: 1.8rem; }
      .detail-row { flex-direction: column; gap: 5px; }
      .detail-value { text-align: left; max-width: 100%; }
    }
  </style>
</head>
<body>

<nav style="padding: 1.2rem 2rem; max-width: 1280px; margin: 0 auto; width: 100%; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
  <a href="/" style="font-family: 'Playfair Display', serif; font-weight: 600; font-size: 1.4rem; text-decoration: none; color: #1e2a1c;">Heavenxent Keepsakes</a>
  <div style="display: flex; gap: 18px;">
    <a href="/tag-editor/index.html" style="text-decoration: none; color: #5b4b3a; font-weight: 400;">Design studio</a>
    <a href="/#products" style="text-decoration: none; color: #5b4b3a;">Collection</a>
  </div>
</nav>

<div class="success-container">
  <div class="success-card" id="successCard">
    <div id="dynamicStatusContent">
      <div class="loading-text">
        <div class="loader"></div>
        <span>Verifying your payment status...</span>
      </div>
    </div>
  </div>
</div>

<footer style="margin-top: auto; text-align: center; padding: 2rem 1rem 2rem; border-top: 1px solid #f0e5db; font-size: 0.8rem; color: #ad9f8d;">
  <p>✨ Heavenxent Keepsakes — where your love becomes art ✨</p>
  <p style="margin-top: 0.5rem;">Need help? <a href="/cdn-cgi/l/email-protection#70180118100730001d0b1c1d0600190f0e1e5e0107" style="color:#7a6852;">hello@heavenxentph.com</a></p>
</footer>

<script>
  (function() {
    // Get order reference from URL (passed by PayMongo redirect)
    const urlParams = new URLSearchParams(window.location.search);
    let orderRef = urlParams.get('ref');
    const orderEmail = urlParams.get('email');
    const orderName = urlParams.get('name');
    const orderType = urlParams.get('type');
    
    // Also check for PayMongo's session_id as fallback
    const sessionId = urlParams.get('session_id');
    
    console.log('Order Reference from URL:', orderRef);
    console.log('Session ID:', sessionId);
    
    let pollInterval = null;
    let pollCount = 0;
    const MAX_POLLS = 40; // 40 seconds max polling
    
    // Function to check payment status from webhook data
    async function checkPaymentStatus(ref, email) {
      try {
        let url = `/api/check-order-status?`;
        if (ref) {
          url += `ref=${encodeURIComponent(ref)}`;
        } else if (email) {
          url += `email=${encodeURIComponent(email)}`;
        } else {
          url += `session_id=${encodeURIComponent(sessionId)}`;
        }
        
        const response = await fetch(url, {
          method: 'GET',
          headers: {
            'Content-Type': 'application/json'
          }
        });
        
        if (response.ok) {
          const data = await response.json();
          console.log('Payment status response:', data);
          return data;
        } else {
          console.log('API returned error:', response.status);
          return null;
        }
      } catch (error) {
        console.log('Error checking payment status:', error);
        return null;
      }
    }
    
    // Function to get order info from localStorage (set by checkout.js)
    function getLocalOrderInfo() {
      try {
        // Check for stored order info
        const stored = localStorage.getItem('heavenxent_last_order');
        if (stored) {
          return JSON.parse(stored);
        }
        
        // Also check session storage
        const session = sessionStorage.getItem('pending_checkout_order');
        if (session) {
          return JSON.parse(session);
        }
      } catch(e) {}
      return null;
    }
    
    // Render the order status UI
    function renderOrderUI(orderData) {
      const isPaid = orderData.status === 'paid' || orderData.payment_status === 'paid';
      const isPending = !isPaid;
      
      let statusBadgeHtml = '';
      if (isPaid) {
        statusBadgeHtml = `<span class="status-badge"><span>✓</span> Payment confirmed · ${orderData.payment_method || 'Card/GCash'}</span>`;
      } else {
        statusBadgeHtml = `<span class="status-badge pending"><span>⏳</span> Payment processing · we'll notify you</span>`;
      }
      
      const mainTitle = isPaid 
        ? `Your keepsake is<span style="font-style: italic;"> being prepared</span>`
        : `We're holding your design<span style="font-style: italic;"> for you</span>`;
      
      const subText = isPaid
        ? "Payment successful — your order is now being processed."
        : "Your payment is being verified. This usually takes less than a minute.";

      // Format amount
      let amountPHP = orderData.amount;
      if (!amountPHP) {
        amountPHP = orderData.type === "PDF" ? 14900 : 19900;
      }
      
      const orderTypeDisplay = orderData.type === "PDF" ? "📄 Digital PDF (instant download)" : "🖨️ Premium Print + Delivery";
      const orderDate = orderData.date || new Date().toLocaleDateString('en-PH', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      
      let orderRows = `
        <div class="detail-row">
          <span class="detail-label">Order reference</span>
          <span class="detail-value">${escapeHtml(orderData.ref || orderData.order_ref || 'N/A')}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Order type</span>
          <span class="detail-value">${orderTypeDisplay}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Total amount</span>
          <span class="detail-value">₱ ${amountPHP.toLocaleString()}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Purchaser</span>
          <span class="detail-value">${escapeHtml(orderData.name)}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Date</span>
          <span class="detail-value">${orderDate}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Payment status</span>
          <span class="detail-value"><span class="payment-status ${isPaid ? '' : 'pending-status'}">${isPaid ? '✓ Successful' : '⏳ Awaiting confirmation'}</span></span>
        </div>
      `;
      
      // Add download link if PDF and paid
      let downloadSection = '';
      if (isPaid && orderData.type === 'PDF' && orderData.driveFileUrl) {
        downloadSection = `
          <div style="margin: 1rem 0; text-align: center;">
            <a href="${orderData.driveFileUrl}" target="_blank" class="download-link">
              📎 Download Your PDF Now
            </a>
            <p style="font-size: 0.7rem; color: #888; margin-top: 8px;">Link also sent to your email</p>
          </div>
        `;
      }
      
      let emailNoticeHtml = '';
      if (orderData.email) {
        emailNoticeHtml = `
          <div class="email-notice">
            <span class="email-icon">📧</span>
            <span>Confirmation sent to <strong>${escapeHtml(orderData.email)}</strong>. 
            ${isPaid && orderData.type === 'PDF' ? 'Check your inbox for your download link.' : 'We\'ll email you once everything is ready.'}</span>
          </div>
        `;
      }
      
      let manualRefreshButton = '';
      if (!isPaid) {
        manualRefreshButton = `
          <div style="margin-top: 1rem;">
            <button onclick="window.location.reload()" class="refresh-btn">
              ↻ Check status again
            </button>
          </div>
        `;
      }
      
      const actionButtons = `
        <div class="btn-group">
          <a href="/tag-editor/index.html" class="btn-primary">
            <span>✨ Create another design</span>
          </a>
          <a href="/" class="btn-outline">
            ← Back to home
          </a>
        </div>
      `;
      
      let extraNote = '';
      if (isPaid && orderData.type === 'PDF') {
        extraNote = `<div class="footnote">💡 Can't find the email? Check your spam folder, or <a href="/cdn-cgi/l/email-protection" style="color: #c4956a;">contact us</a> and we'll resend your download link.</div>`;
      } else if (isPaid && orderData.type !== 'PDF') {
        extraNote = `<div class="footnote">🖨️ Print orders are processed within 5-7 business days. You'll receive a shipping confirmation once ready.</div>`;
      } else {
        extraNote = `<div class="footnote">⏳ Payments usually reflect within 1-2 minutes. This page will update automatically once confirmed.</div>`;
      }
      
      const fullHtml = `
        <div class="icon-illustration">
          <svg class="checkmark-svg" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="${isPaid ? 'M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z' : 'M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z'}" />
          </svg>
        </div>
        ${statusBadgeHtml}
        <h1>${mainTitle}</h1>
        <p class="subhead">${subText}</p>
        <div class="order-details-panel">
          ${orderRows}
        </div>
        ${downloadSection}
        ${emailNoticeHtml}
        ${manualRefreshButton}
        ${actionButtons}
        ${extraNote}
      `;
      
      document.getElementById("dynamicStatusContent").innerHTML = fullHtml;
      
      // If paid, stop polling
      if (isPaid && pollInterval) {
        clearInterval(pollInterval);
        pollInterval = null;
      }
    }
    
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }
    
    // Main initialization
    async function init() {
      // First, check if we have order reference from URL
      if (!orderRef && !orderEmail && !sessionId) {
        // No order info in URL - try to get from localStorage
        const localOrder = getLocalOrderInfo();
        if (localOrder && localOrder.ref) {
          orderRef = localOrder.ref;
          console.log('Using stored order reference:', orderRef);
        } else {
          // No order info at all - show error but still helpful
          document.getElementById("dynamicStatusContent").innerHTML = `
            <div class="error-message">
              <strong>⚠️ Order information not found</strong>
              <p style="margin-top: 8px;">Your payment was successful, but we couldn't find your order details.</p>
              <p style="margin-top: 8px;">Please check your email for your order confirmation and download link.</p>
              <p style="margin-top: 8px;">If you haven't received anything within 5 minutes, please contact our support team.</p>
            </div>
            <div class="btn-group">
              <a href="/" class="btn-primary">← Back to home</a>
              <a href="/tag-editor/index.html" class="btn-outline">Create new design</a>
            </div>
          `;
          return;
        }
      }
      
      // First check: query the API
      let orderData = await checkPaymentStatus(orderRef, orderEmail);
      
      if (orderData && orderData.status === 'paid') {
        // Payment confirmed! Show success UI
        renderOrderUI(orderData);
      } else if (orderData && orderData.status === 'pending') {
        // Payment still pending - show pending UI and start polling
        renderOrderUI({
          ref: orderRef,
          email: orderEmail,
          name: orderName || 'Valued Customer',
          type: orderType || 'PDF',
          status: 'pending',
          payment_status: 'pending'
        });
        
        // Start polling every 3 seconds
        pollInterval = setInterval(async () => {
          pollCount++;
          const newData = await checkPaymentStatus(orderRef, orderEmail);
          if (newData && newData.status === 'paid') {
            clearInterval(pollInterval);
            renderOrderUI(newData);
          } else if (pollCount >= MAX_POLLS) {
            clearInterval(pollInterval);
            // Still pending after max polls, but don't show error - just let user refresh manually
            const refreshNote = document.querySelector('.refresh-btn');
            if (refreshNote) {
              refreshNote.style.display = 'inline-block';
            }
          }
        }, 3000);
      } else {
        // No data yet - show pending with order info from URL
        renderOrderUI({
          ref: orderRef,
          email: orderEmail,
          name: orderName || 'Valued Customer',
          type: orderType || 'PDF',
          status: 'pending',
          payment_status: 'pending'
        });
        
        // Start polling
        pollInterval = setInterval(async () => {
          pollCount++;
          const newData = await checkPaymentStatus(orderRef, orderEmail);
          if (newData && newData.status === 'paid') {
            clearInterval(pollInterval);
            renderOrderUI(newData);
          } else if (pollCount >= MAX_POLLS) {
            clearInterval(pollInterval);
          }
        }, 3000);
      }
    }
    
    // Start the app
    init();
  })();
</script>
</body>
</html>
