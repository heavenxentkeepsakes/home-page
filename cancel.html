<!DOCTYPE html>
<html>
<head>
  <title>Payment Cancelled</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 50px;
    }
    .box {
      max-width: 500px;
      margin: auto;
    }
    .cancel {
      color: red;
      font-size: 24px;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      background: black;
      color: white;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1 class="cancel">❌ Payment Cancelled</h1>
    <p>Your payment was not completed.</p>
    <p>You can try again anytime.</p>

    <a href="/" class="btn">Try Again</a>
  </div>
</body>
</html>
